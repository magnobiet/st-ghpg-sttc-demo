name: Deploy static site

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate repository files
        shell: bash
        run: |
          missing_files=()

          if [ ! -f .gitignore ]; then
            missing_files+=(".gitignore")
          fi

          if [ ! -f project.toml ]; then
            missing_files+=("project.toml")
          fi

          if [ ${#missing_files[@]} -gt 0 ]; then
            message="Required repository files missing: ${missing_files[*]}"
            echo "::error::$message"
            echo "## Validation failed" >> "$GITHUB_STEP_SUMMARY"
            echo "$message" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Prepare static publish directory
        shell: bash
        run: |
          mkdir -p dist

          rsync -av \
            --delete \
            --filter=':- .gitignore' \
            ./src/ ./dist/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Bump version and commit
        id: version_bump
        shell: bash
        env:
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail

          version_line=$(grep -E '^version\s*=' project.toml | head -n 1)
          version=$(echo "$version_line" | sed -E 's/.*"([^"]+)".*/\1/')

          IFS='.' read -r major minor patch <<< "$version"
          new_minor=$((minor + 1))
          new_version="${major}.${new_minor}.0"
          node - <<'NODE'
          const fs = require('fs');
          const path = 'project.toml';
          const text = fs.readFileSync(path, 'utf8');
          const match = text.match(/^version\s*=\s*"([0-9]+)\.([0-9]+)\.([0-9]+)"/m);

          if (!match) {
            throw new Error('Could not find version in project.toml');
          }

          const major = match[1];
          const minor = parseInt(match[2], 10) + 1;
          const newVersion = `${major}.${minor}.0`;

          const updated = text.replace(match[0], `version = "${newVersion}"`);
          fs.writeFileSync(path, updated);
          console.log(`Updated version to ${newVersion}`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `new_version=${newVersion}\n`);
          NODE

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add project.toml
          if git diff --cached --quiet; then
            echo "No version change detected."
            exit 0
          fi

          git commit -m "chore: bump version to ${new_version}"
          tag_name="v${major}.${new_minor}.0"
          git tag "$tag_name"

          git push origin "refs/tags/$tag_name"

      - name: Summary
        shell: bash
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "![HTML5](https://img.shields.io/badge/html5-%23E34F26.svg?style=for-the-badge&logo=html5&logoColor=white) ![CSS](https://img.shields.io/badge/css-%23663399.svg?style=for-the-badge&logo=css&logoColor=white) ![JavaScript](https://img.shields.io/badge/javascript-%23323330.svg?style=for-the-badge&logo=javascript&logoColor=%23F7DF1E) ![GitHub Actions](https://img.shields.io/badge/github%20actions-%232671E5.svg?style=for-the-badge&logo=githubactions&logoColor=white) ![Github Pages](https://img.shields.io/badge/github%20pages-121013?style=for-the-badge&logo=github&logoColor=white)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Storybook deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "The Storybook is available at https://magnobiet.com/st-ghpg-sttc-demo/" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Version" >> "$GITHUB_STEP_SUMMARY"
          echo "Generated version: ${{ steps.version_bump.outputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
